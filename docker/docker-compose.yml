# Rig Tools — Docker Compose (single-service)
#
# Streamlit + FastAPI run in one process via asgi.py using Streamlit's
# experimental Starlette integration (Streamlit 1.53+).
#
# Endpoints (all on :8501):
#   http://localhost:8501          → Streamlit app
#   http://localhost:8501/api/*    → FastAPI routes
#   http://localhost:8501/api/docs → Swagger UI

services:

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: rig-tools
    ports:
      - "8501:8501"
    volumes:
      - ../src:/app/src
      - ../data:/app/data
    env_file:
      - .env
    environment:
      - DATA_PATH=/app/data
      - STREAMLIT_CLIENT_SHOW_SIDEBAR_NAVIGATION=false
      # API_BASE_URL is not needed — FastAPI is in the same process on the same port.
      # Set it explicitly only if you need to override for external API access.
      # - API_BASE_URL=http://localhost:8501
    restart: unless-stopped
