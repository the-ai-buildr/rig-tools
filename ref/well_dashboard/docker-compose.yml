version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: well_dashboard_api
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db
      - ./exports:/app/exports
      - ./templates:/app/templates
    environment:
      - DATABASE_PATH=/app/db/well_database.db
      - EXPORT_PATH=/app/exports
      - TEMPLATE_PATH=/app/templates
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - SECRET_KEY=your-secret-key-change-in-production
      - DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: well_dashboard_frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: well_dashboard_network
